# Конфигурация logrotate для GigaChat логов
# Применение: logrotate -s /var/lib/logrotate/astroai.status /path/to/backend/logrotate.conf
#
# Для автоматической ротации добавить в cron:
#   0 0 * * * logrotate -s ~/.logrotate-astroai.status /path/to/backend/logrotate.conf

/path/to/backend/logs/gigachat.log {
    # Ротация при достижении 100MB
    size 100M

    # Хранить 5 архивов (итого до 500MB)
    rotate 5

    # Сжимать архивы
    compress
    delaycompress

    # Не падать, если файл ещё не создан
    missingok
    notifempty

    # Добавлять дату к архивным файлам: gigachat.log-20260303.gz
    dateext
    dateformat -%Y%m%d

    # Создать новый пустой файл после ротации
    create 0640 root root

    # Не посылать сигнал процессу (Python сам откроет новый файл при следующей записи)
    copytruncate
}
